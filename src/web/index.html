<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Funkedupshift</title>
  <link rel="stylesheet" href="pop.css">
</head>
<body>
  <div class="pop-content pop-wrap">
    <!-- Hero -->
    <section class="pop-hero" id="hero">
      <div class="pop-hero__stage" id="heroStage">
        <div class="pop-wordmark" id="wordmark">
          <span class="pop-wordmark__base">FUNKED<br>UP SHIFT</span>
          <span class="pop-wordmark__ghost pop-wordmark__ghost--cyan" aria-hidden="true">FUNKED<br>UP SHIFT</span>
          <span class="pop-wordmark__ghost pop-wordmark__ghost--lime" aria-hidden="true">FUNKED<br>UP SHIFT</span>
        </div>
      </div>
      <p class="pop-hero__subtitle">A funky stash of mini-apps</p>
      <a class="pop-btn pop-btn--magenta pop-hero__cta" href="#works" id="enterFunk">Enter the funk ↓</a>

      <span class="pop-badge pop-badge--sticker pop-sticker pop-sticker--tl accent-n2" style="--accent:var(--n2)">★ daily-driven</span>
      <span class="pop-badge pop-badge--sticker pop-sticker pop-sticker--tr" style="--accent:var(--n3)">est. funk</span>
      <span class="pop-badge pop-badge--sticker pop-sticker pop-sticker--bl" style="--accent:var(--n4)">made with chaos</span>
    </section>

    <!-- The Works -->
    <h2 class="pop-section-title" id="works">The Works</h2>
    <div class="pop-works" id="worksGrid"></div>
  </div>

  <div class="pop-cursor" id="popCursor"></div>

  <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.0/dist/amazon-cognito-identity.min.js"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="auth-button.js"></script>
  <script src="profile-box.js"></script>
  <script src="pop-chrome.js"></script>
  <script>
    (function () {
      var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      var fine = window.matchMedia && window.matchMedia('(pointer: fine)').matches;

      // ---- Works grid (squash gated like before) ----
      var WORKS = [
        { title: 'Expense Tracker',     blurb: 'Every dollar, logged daily.',        status: 'LIVE',     tag: 'money' },
        { title: 'Financial App',       blurb: 'Budgets, forecasts & net worth.',    status: 'BUILDING', tag: 'money' },
        { title: 'Merch Store',         blurb: 'Funky goods, dropping soon.',         status: 'SOON',     tag: 'shop' },
        { title: 'Site Catalog',        blurb: 'A curated stash of the web.',         status: 'LIVE',     tag: 'web',   href: 'websites.html' },
        { title: 'Media Library',       blurb: 'Films, shows & music, all tagged.',   status: 'LIVE',     tag: 'media', href: 'media.html' },
        { title: 'Internet Dashboard',  blurb: 'My corner of the net at a glance.',   status: 'LIVE',     tag: 'net',   href: 'internet-dashboard.html' },
        { title: 'Squash Tracker',      blurb: 'Matches, ladders & stats.',           status: 'LIVE',     tag: 'sport', href: 'squash.html', squash: true },
        { title: 'Something New',       blurb: 'Cooking up the next funky thing.',    status: 'SOON',     tag: 'tbd' }
      ];
      var ACCENTS = ['--n1', '--n2', '--n3', '--n4'];

      function statusClass(s) { return s === 'LIVE' ? '--n4' : s === 'BUILDING' ? '--n2' : '--n3'; }

      function render(canSquash) {
        var grid = document.getElementById('worksGrid');
        grid.innerHTML = '';
        var visible = WORKS.filter(function (w) { return w.squash ? canSquash : true; });
        visible.forEach(function (w, i) {
          var accent = ACCENTS[i % ACCENTS.length];
          var tilt = (i % 2 ? 1.5 : -1.5) + 'deg';
          var card = document.createElement(w.href ? 'a' : 'div');
          card.className = 'pop-card pop-card--tilt pop-work';
          card.style.setProperty('--accent', 'var(' + accent + ')');
          card.style.setProperty('--tilt', tilt);
          if (w.href) card.href = w.href;
          var idx = ('0' + (i + 1)).slice(-2);
          card.innerHTML =
            '<div class="pop-work__top">' +
              '<span class="pop-work__idx">' + idx + '</span>' +
              '<span class="pop-badge" style="--accent:var(' + statusClass(w.status) + ')">' + w.status + '</span>' +
            '</div>' +
            '<div class="pop-work__title">' + w.title + '</div>' +
            '<div class="pop-work__blurb">' + w.blurb + '</div>' +
            '<div class="pop-work__foot"><span class="pop-tag">' + w.tag + '</span>' +
              (w.href ? '<span>Open ↗</span>' : '<span style="color:var(--muted)">—</span>') +
            '</div>';
          grid.appendChild(card);
        });
      }
      render(false);

      // reveal the squash card only for authorized users (same /me check as before)
      function checkSquash() {
        if (!window.auth) return;
        window.auth.isAuthenticated(function (isAuth) {
          if (!isAuth) return;
          var base = (window.API_BASE_URL || '').replace(/\/$/, '');
          if (!base) return;
          window.auth.getAccessToken(function (token) {
            fetch(base + '/me', { headers: token ? { Authorization: 'Bearer ' + token } : {} })
              .then(function (r) { return r.ok ? r.json() : null; })
              .then(function (user) {
                if (!user) return;
                var groups = user.groups || [];
                var customGroups = user.customGroups || [];
                var squashInCustom = customGroups.some(function (g) { return (g || '').trim() === 'Squash'; });
                if (squashInCustom || groups.indexOf('admin') !== -1) render(true);
              })
              .catch(function () {});
          });
        });
      }
      function initSquash() {
        if (!window.auth) { setTimeout(initSquash, 100); return; }
        checkSquash();
      }
      initSquash();

      // ---- Hero parallax (skip on touch / reduced motion) ----
      var stage = document.getElementById('heroStage');
      var wordmark = document.getElementById('wordmark');
      var hero = document.getElementById('hero');
      if (!reduce && fine) {
        hero.addEventListener('mousemove', function (e) {
          var r = hero.getBoundingClientRect();
          var mx = (e.clientX - r.left) / r.width - .5;
          var my = (e.clientY - r.top) / r.height - .5;
          stage.style.transform = 'rotateX(' + (-my * 10) + 'deg) rotateY(' + (mx * 10) + 'deg)';
          wordmark.style.transform = 'translate(' + (mx * 14) + 'px,' + (my * 14) + 'px)';
        });
        hero.addEventListener('mouseleave', function () {
          stage.style.transform = '';
          wordmark.style.transform = '';
        });
      }

      // ---- CTA smooth scroll ----
      document.getElementById('enterFunk').addEventListener('click', function (e) {
        e.preventDefault();
        document.getElementById('works').scrollIntoView({ behavior: reduce ? 'auto' : 'smooth' });
      });

      // ---- Custom rainbow cursor (fine pointers only) ----
      var cursor = document.getElementById('popCursor');
      if (!reduce && fine) {
        var hue = 0;
        document.addEventListener('mousemove', function (e) {
          cursor.style.left = e.clientX + 'px';
          cursor.style.top = e.clientY + 'px';
          hue = (hue + 4) % 360;
          cursor.style.background = 'hsl(' + hue + ',85%,55%)';
        });
      } else if (cursor) {
        cursor.style.display = 'none';
      }
    })();
  </script>
</body>
</html>
